<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lubdha & Pawan</title><style>

body{
margin:0;
background:#f4efe6;
font-family:serif;
overflow-x:hidden;
}

/* ENVELOPE SCREEN */

.envelope-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#f4efe6;
z-index:999;
}

/* ENVELOPE IMAGE */

.envelope{
width:90%;
max-width:400px;
}

/* SEAL */

.seal{
width:110px;
margin-top:-110px;
cursor:pointer;
transition:0.3s;
}

.seal:hover{
transform:scale(1.1);
}

/* VIDEO */

.hero video{
width:100%;
height:100vh;
object-fit:contain;
background:black;
}

/* EVENTS */

section{
padding:60px 20px;
text-align:center;
}

.event{
background:white;
margin:20px;
padding:30px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

/* GALLERY */

.gallery{
display:flex;
gap:20px;
overflow:hidden;
}

.gallery-track{
display:flex;
gap:20px;
animation:slide 20s linear infinite;
}

.gallery img{
height:250px;
border-radius:14px;
}

@keyframes slide{

0%{transform:translateX(0)}
100%{transform:translateX(-50%)}

}

<img src="gallery2.jpg">
<img src="gallery3.jpg">
<img src="gallery4.png">
<img src="gallery5.jpg"><img src="gallery1.jpg">
<img src="gallery2.jpg">
<img src="gallery3.jpg">
<img src="gallery4.png">
<img src="gallery5.jpg"></div></div></section><script>

function openInvite(){

document.getElementById("envelope").style.display="none"

}

</script></body>
</html>
